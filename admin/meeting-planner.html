<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meeting Planner · Admin | Rotary Club Bangkok DACH</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" href="https://brandcenter.rotary.org/images/default-source/guidelines-images/color/rotary_masterbrand_simplified-color_rgb.svg" type="image/svg+xml" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            rotary: { blue: '#17458f', gold: '#f7a81b', azure: '#0067c8', sky: '#00a2e0', cranberry: '#d41367' }
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          animation: { 'fade-in': 'fadeIn 0.6s ease-out' },
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/admin/admin.css" />
</head>
<body class="font-sans text-white antialiased">

  <header class="sticky top-0 z-50 glass-header">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between">
      <a href="/" class="flex items-center gap-3 hover:opacity-80 transition-opacity" title="Application page">
        <img src="https://rotary-bkkdach.clubdesk.com/clubdesk/wwwfiles/logo.png" alt="Rotary Club Bangkok DACH" class="h-12 w-auto rounded-lg" />
        <div>
          <h1 class="text-lg font-bold text-white leading-tight">Rotary Club</h1>
          <p class="text-xs text-glass-gold font-medium -mt-0.5">Bangkok DACH</p>
        </div>
      </a>
      <div class="flex items-center gap-4 text-sm text-glass-secondary">
        <div class="hidden sm:flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
          <span>office@rotary-club-bangkok-dach.org</span>
        </div>
        <button onclick="adminLogout()" class="text-white/40 hover:text-white/70 text-sm transition-colors flex items-center gap-1" title="Logout">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
          Logout
        </button>
      </div>
    </div>
  </header>

  <header class="px-4 py-3" style="background: rgba(10, 22, 40, 0.6); backdrop-filter: blur(40px); border-bottom: 1px solid rgba(255,255,255,0.1);">
    <div class="max-w-6xl mx-auto flex items-center">
      <div class="flex items-center gap-3">
        <a href="/admin" class="text-white/50 hover:text-white/80 transition-colors" title="Back to Admin">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 17l-5-5m0 0l5-5m-5 5h12"/></svg>
        </a>
        <div class="h-5 w-px bg-white/20"></div>
        <h1 class="text-lg font-bold">Meeting Planner</h1>
        <span class="text-xs bg-rotary-gold/20 text-rotary-gold px-2 py-0.5 rounded-full font-medium">Admin</span>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-8 animate-fade-in">
    <div class="glass-card rounded-2xl overflow-hidden">
      <div class="px-6 py-4 border-b border-white/10 flex flex-wrap items-center gap-3 justify-between">
        <div>
          <h2 class="font-bold text-lg" id="meetingsTitle">Meetings</h2>
          <p id="meetingsMeta" class="text-white/40 text-xs mt-0.5">&nbsp;</p>
        </div>
        <div class="flex gap-2">
          <button onclick="selectAllMeetings()" class="btn-secondary px-3 py-2 rounded-lg text-sm font-medium">Select all</button>
          <button onclick="clearAllMeetings()" class="btn-secondary px-3 py-2 rounded-lg text-sm font-medium">Clear</button>
        </div>
      </div>
      <div id="meetingsLoading" class="px-6 py-12 text-center text-white/40">
        <svg class="w-6 h-6 animate-spin mx-auto mb-2" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
        Loading meetings...
      </div>
      <div id="meetingsContent" class="hidden p-6 space-y-7"></div>
    </div>
  </main>

  <script src="/admin/admin.js"></script>
  <script>
    requireAuthOrRedirect();

    const YEAR = new Date().getFullYear();
    const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const SHORT_MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    let allWednesdays = [];
    let meetings = {}; // { 'YYYY-MM-DD': topic }
    let pendingSave = null;

    function generateAllWednesdays(year) {
      const out = [];
      const d = new Date(Date.UTC(year, 0, 1));
      while (d.getUTCDay() !== 3) d.setUTCDate(d.getUTCDate() + 1);
      while (d.getUTCFullYear() === year) {
        const yyyy = d.getUTCFullYear();
        const mm = String(d.getUTCMonth() + 1).padStart(2, '0');
        const dd = String(d.getUTCDate()).padStart(2, '0');
        out.push(`${yyyy}-${mm}-${dd}`);
        d.setUTCDate(d.getUTCDate() + 7);
      }
      return out;
    }

    async function loadMeetings() {
      document.getElementById('meetingsLoading').classList.remove('hidden');
      document.getElementById('meetingsContent').classList.add('hidden');
      try {
        const data = await apiFetch('/api/admin/meetings');
        meetings = data.meetings || {};
        allWednesdays = generateAllWednesdays(YEAR);
        document.getElementById('meetingsTitle').textContent = `${YEAR} Meetings`;
        renderMeetings();
      } catch (err) {
        if (err.message !== 'Unauthorized') showToast('Failed to load meetings', 'error');
      }
      document.getElementById('meetingsLoading').classList.add('hidden');
    }

    function renderMeetings() {
      const byMonth = {};
      for (const ds of allWednesdays) {
        const m = parseInt(ds.slice(5, 7), 10) - 1;
        (byMonth[m] = byMonth[m] || []).push(ds);
      }

      const selectedCount = Object.values(meetings).filter(m => m && m.active).length;
      document.getElementById('meetingsMeta').textContent =
        `${selectedCount} of ${allWednesdays.length} Wednesdays selected`;

      const html = Object.keys(byMonth).map(Number).sort((a, b) => a - b).map(m => {
        const items = byMonth[m].map(ds => {
          const day = parseInt(ds.slice(8, 10), 10);
          const entry = meetings[ds] || { active: false, topic: '', presenter: '' };
          const isSel = !!entry.active;
          const cardClasses = isSel
            ? 'bg-rotary-gold/20 border-rotary-gold/50'
            : 'bg-white/5 border-white/10 hover:bg-white/10';
          const editorHtml = isSel
            ? `<input type="text"
                class="w-full bg-transparent border-0 border-t border-rotary-gold/20 px-3 py-2 text-xs text-white placeholder-white/40 focus:outline-none focus:bg-white/5"
                placeholder="Topic…"
                value="${escapeHtml(entry.topic)}"
                onchange="updateTopic('${ds}', this.value)" />
              <input type="text"
                class="w-full bg-transparent border-0 border-t border-rotary-gold/10 px-3 py-2 text-xs text-white placeholder-white/40 focus:outline-none focus:bg-white/5"
                placeholder="Presenter…"
                value="${escapeHtml(entry.presenter)}"
                onchange="updatePresenter('${ds}', this.value)" />`
            : '';
          return `<div class="rounded-xl border transition-all overflow-hidden ${cardClasses}">
            <button type="button" onclick="toggleMeeting('${ds}')" class="w-full text-left px-3 py-2.5">
              <div class="text-[10px] font-bold uppercase tracking-wider ${isSel ? 'text-rotary-gold' : 'text-white/40'}">Wed</div>
              <div class="text-2xl font-extrabold ${isSel ? 'text-white' : 'text-white/50'} leading-tight">${day}</div>
            </button>
            ${editorHtml}
          </div>`;
        }).join('');
        return `<div>
          <h3 class="text-xs font-bold text-white/60 mb-3 uppercase tracking-wider">${MONTH_NAMES[m]}</h3>
          <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-2 items-start">${items}</div>
        </div>`;
      }).join('');

      document.getElementById('meetingsContent').innerHTML = html;
      document.getElementById('meetingsContent').classList.remove('hidden');
    }

    function scheduleSave() {
      clearTimeout(pendingSave);
      pendingSave = setTimeout(async () => {
        try {
          await apiFetch('/api/admin/meetings', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ meetings }),
          });
        } catch (err) {
          if (err.message !== 'Unauthorized') showToast('Save failed', 'error');
        }
      }, 350);
    }

    function ensureEntry(ds) {
      if (!meetings[ds]) meetings[ds] = { active: false, topic: '', presenter: '' };
      return meetings[ds];
    }

    function toggleMeeting(ds) {
      const e = ensureEntry(ds);
      e.active = !e.active;
      renderMeetings();
      scheduleSave();
    }

    function updateTopic(ds, value) {
      const e = ensureEntry(ds);
      const trimmed = (value || '').trim();
      if (e.topic === trimmed) return;
      e.topic = trimmed;
      scheduleSave();
    }

    function updatePresenter(ds, value) {
      const e = ensureEntry(ds);
      const trimmed = (value || '').trim();
      if (e.presenter === trimmed) return;
      e.presenter = trimmed;
      scheduleSave();
    }

    function selectAllMeetings() {
      for (const ds of allWednesdays) ensureEntry(ds).active = true;
      renderMeetings();
      scheduleSave();
    }

    function clearAllMeetings() {
      for (const ds in meetings) meetings[ds].active = false;
      renderMeetings();
      scheduleSave();
    }

    if (adminPassword) loadMeetings();
  </script>
</body>
</html>
