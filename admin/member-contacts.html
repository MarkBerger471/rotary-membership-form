<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Member Contacts · Admin | Rotary Club Bangkok DACH</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" href="https://brandcenter.rotary.org/images/default-source/guidelines-images/color/rotary_masterbrand_simplified-color_rgb.svg" type="image/svg+xml" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            rotary: { blue: '#17458f', gold: '#f7a81b', azure: '#0067c8', sky: '#00a2e0', cranberry: '#d41367' }
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          animation: { 'fade-in': 'fadeIn 0.6s ease-out' },
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/admin/admin.css" />
</head>
<body class="font-sans text-white antialiased">

  <header class="sticky top-0 z-50 glass-header">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between">
      <a href="/" class="flex items-center gap-3 hover:opacity-80 transition-opacity" title="Application page">
        <img src="https://rotary-bkkdach.clubdesk.com/clubdesk/wwwfiles/logo.png" alt="Rotary Club Bangkok DACH" class="h-12 w-auto rounded-lg" />
        <div>
          <h1 class="text-lg font-bold text-white leading-tight">Rotary Club</h1>
          <p class="text-xs text-glass-gold font-medium -mt-0.5">Bangkok DACH</p>
        </div>
      </a>
      <div class="flex items-center gap-4 text-sm text-glass-secondary">
        <div class="hidden sm:flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
          <span>office@rotary-club-bangkok-dach.org</span>
        </div>
        <button onclick="adminLogout()" class="text-white/40 hover:text-white/70 text-sm transition-colors flex items-center gap-1" title="Logout">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
          Logout
        </button>
      </div>
    </div>
  </header>

  <header class="px-4 py-3" style="background: rgba(10, 22, 40, 0.6); backdrop-filter: blur(40px); border-bottom: 1px solid rgba(255,255,255,0.1);">
    <div class="max-w-6xl mx-auto flex items-center">
      <div class="flex items-center gap-3">
        <a href="/admin" class="text-white/50 hover:text-white/80 transition-colors" title="Back to Admin">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 17l-5-5m0 0l5-5m-5 5h12"/></svg>
        </a>
        <div class="h-5 w-px bg-white/20"></div>
        <h1 class="text-lg font-bold">Member Contacts</h1>
        <span class="text-xs bg-rotary-gold/20 text-rotary-gold px-2 py-0.5 rounded-full font-medium">Admin</span>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-8 animate-fade-in">
    <div class="glass-card rounded-2xl overflow-hidden">
      <div class="px-6 py-4 border-b border-white/10 flex flex-wrap items-center gap-3 justify-between">
        <div>
          <h2 class="font-bold text-lg">Member Directory</h2>
          <p id="contactsMeta" class="text-white/40 text-xs mt-0.5">&nbsp;</p>
        </div>
        <div class="flex items-center gap-2 flex-1 sm:flex-none sm:min-w-[280px]">
          <input type="search" id="contactsSearch" class="glass-input flex-1 px-3 py-2 rounded-lg text-sm" placeholder="Search name, email, city…" />
          <button onclick="loadContacts()" class="btn-secondary px-3 py-2 rounded-lg text-sm font-medium" title="Refresh">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
          </button>
        </div>
      </div>
      <div id="contactsLoading" class="px-6 py-12 text-center text-white/40">
        <svg class="w-6 h-6 animate-spin mx-auto mb-2" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
        Loading contacts...
      </div>
      <div id="contactsEmpty" class="hidden px-6 py-12 text-center text-white/40">
        <p class="font-medium">No member contacts yet</p>
      </div>
      <div id="contactsGrid" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 p-6"></div>
    </div>
  </main>

  <script src="/admin/admin.js"></script>
  <script>
    requireAuthOrRedirect();

    let contacts = [];

    async function loadContacts() {
      document.getElementById('contactsLoading').classList.remove('hidden');
      document.getElementById('contactsGrid').classList.add('hidden');
      document.getElementById('contactsEmpty').classList.add('hidden');
      try {
        const data = await apiFetch('/api/admin/contacts');
        contacts = data.contacts || [];
        renderContacts();
      } catch (err) {
        if (err.message !== 'Unauthorized') showToast('Failed to load contacts', 'error');
      }
      document.getElementById('contactsLoading').classList.add('hidden');
    }

    function renderContacts() {
      const q = (document.getElementById('contactsSearch').value || '').trim().toLowerCase();
      const filtered = q
        ? contacts.filter(c => [c.firstName, c.lastName, c.email, c.city, c.phone].some(v => (v || '').toLowerCase().includes(q)))
        : contacts;

      const meta = document.getElementById('contactsMeta');
      meta.textContent = q
        ? `${filtered.length} of ${contacts.length} members`
        : `${contacts.length} active members`;

      const grid = document.getElementById('contactsGrid');
      const empty = document.getElementById('contactsEmpty');
      if (filtered.length === 0) {
        grid.classList.add('hidden');
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');
      grid.classList.remove('hidden');

      grid.innerHTML = filtered.map(c => {
        const name = escapeHtml(`${c.firstName || ''} ${c.lastName || ''}`.trim());
        const initials = ((c.firstName || ' ')[0] + (c.lastName || ' ')[0]).toUpperCase();
        const emailHtml = c.email
          ? `<a href="mailto:${escapeHtml(c.email)}" class="text-rotary-sky hover:text-rotary-gold transition-colors break-all">${escapeHtml(c.email)}</a>`
          : '<span class="text-white/30">—</span>';
        const phoneHtml = c.phone
          ? `<a href="tel:${escapeHtml((c.phone || '').replace(/\s+/g, ''))}" class="hover:text-rotary-gold transition-colors">${escapeHtml(c.phone)}</a>`
          : '<span class="text-white/30">—</span>';
        const cityHtml = c.city ? escapeHtml(c.city) : '';
        const joinHtml = c.joinDate
          ? new Date(c.joinDate).toLocaleDateString('en-GB', { month: 'short', year: 'numeric' })
          : '';
        const addressHtml = c.address ? escapeHtml(c.address).replace(/\r?\n/g, '<br>') : '';

        return `
          <div class="rounded-xl bg-white/5 border border-white/10 p-4 hover:border-white/25 transition-colors">
            <div class="flex items-center gap-3 mb-3">
              <div class="w-10 h-10 rounded-full bg-rotary-gold/20 text-rotary-gold flex items-center justify-center text-sm font-bold flex-shrink-0">${escapeHtml(initials)}</div>
              <div class="min-w-0">
                <div class="font-semibold truncate">${name || '<span class="text-white/40">Unnamed</span>'}</div>
                ${joinHtml ? `<div class="text-xs text-white/40">Member since ${joinHtml}</div>` : ''}
              </div>
            </div>
            <div class="space-y-1.5 text-sm text-white/70">
              <div class="flex items-start gap-2">
                <svg class="w-4 h-4 mt-0.5 text-white/30 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                <div class="min-w-0">${emailHtml}</div>
              </div>
              <div class="flex items-start gap-2">
                <svg class="w-4 h-4 mt-0.5 text-white/30 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
                <div>${phoneHtml}</div>
              </div>
              ${addressHtml ? `<div class="flex items-start gap-2">
                <svg class="w-4 h-4 mt-0.5 text-white/30 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a2 2 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                <div class="min-w-0 text-white/60 text-xs leading-relaxed">${addressHtml}${cityHtml ? `<br>${cityHtml}` : ''}</div>
              </div>` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    document.getElementById('contactsSearch').addEventListener('input', renderContacts);

    if (adminPassword) loadContacts();
  </script>
</body>
</html>
